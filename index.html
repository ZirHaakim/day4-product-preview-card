<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=Montserrat:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="reset.css" />
    <link rel="stylesheet" href="style.css" />
    <title>Product Card</title>
  </head>
  <body>
    <article class="Card-Component">
      <img
        class="myimg"
        src="./images/image-product-mobile.jpg"
        alt="Gabrielle Perfume"
      />
      <div class="content">
        <div class="title">
          <p class="sloggan text-preset-4">Perfume</p>
          <h1 class="Gabrielle text-preset-1">
            Gabrielle Essence Eau De Parfum
          </h1>
          <p class="A-floral text-preset-3">
            A floral, solar and voluptuous interpretation composed by Olivier
            Polge, Perfumer-Creator for the House of CHANEL.
          </p>
        </div>

        <div class="price">
          <p class="price1">$149.99</p>
          <p class="price2">$169.99</p>
        </div>

        <button class="ShoppingCart text-preset-2">
          <img src="./images/icon-cart.svg" alt="" />
          Add To Cart
        </button>
      </div>
    </article>
  </body>
</html>
